<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <!-- Deep dark base with cool-warm split -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080e"/>
      <stop offset="30%" style="stop-color:#0c0814"/>
      <stop offset="60%" style="stop-color:#10081a"/>
      <stop offset="100%" style="stop-color:#08060f"/>
    </linearGradient>
    <!-- Threat spectrum accent: red → amber → red -->
    <linearGradient id="threatBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="30%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="70%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <!-- Diamond icon gradient -->
    <linearGradient id="diamondFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="diamondStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <!-- Orbit ring gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.3"/>
    </linearGradient>
    <!-- Hexagonal grid pattern -->
    <pattern id="hexgrid" x="0" y="0" width="30" height="26" patternUnits="userSpaceOnUse">
      <path d="M15 0 L30 7.5 L30 18.5 L15 26 L0 18.5 L0 7.5 Z" fill="none" stroke="#ef4444" stroke-width="0.15" opacity="0.04"/>
    </pattern>
    <!-- Scan line pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="3" x2="4" y2="3" stroke="#ef4444" stroke-width="0.1" opacity="0.025"/>
    </pattern>
    <!-- Glows -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
    <!-- Filters -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sharpGlow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="300" rx="16"/></clipPath>
  </defs>

  <!-- ═══ Base Layers ═══ -->
  <rect width="900" height="300" rx="16" fill="url(#bg)"/>
  <rect width="900" height="300" rx="16" fill="url(#hexgrid)" clip-path="url(#clip)"/>
  <rect width="900" height="300" rx="16" fill="url(#scanlines)" clip-path="url(#clip)"/>

  <!-- Threat spectrum top bar -->
  <rect width="900" height="3" rx="1.5" fill="url(#threatBar)" clip-path="url(#clip)"/>

  <!-- Ambient glows -->
  <ellipse cx="110" cy="150" rx="140" ry="130" fill="url(#glowCenter)"/>
  <ellipse cx="680" cy="100" rx="200" ry="120" fill="url(#glowAmber)"/>

  <!-- ═══ Central Icon: MITRE Diamond + Atomic Orbits + Radar ═══ -->
  <g transform="translate(110, 150)" filter="url(#softGlow)">

    <!-- Outer orbit rings (atomic-inspired) -->
    <ellipse cx="0" cy="0" rx="85" ry="50" fill="none" stroke="url(#orbitGrad)" stroke-width="0.6"
             transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="85" ry="50" fill="none" stroke="url(#orbitGrad)" stroke-width="0.6"
             transform="rotate(40)"/>
    <ellipse cx="0" cy="0" rx="85" ry="50" fill="none" stroke="url(#orbitGrad)" stroke-width="0.5"
             transform="rotate(100)"/>

    <!-- Radar concentric circles -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#ef4444" stroke-width="0.4" opacity="0.15"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#ef4444" stroke-width="0.3" opacity="0.10"/>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#ef4444" stroke-width="0.2" opacity="0.06"/>

    <!-- MITRE ATT&CK Diamond shape (rotated square) -->
    <rect x="-38" y="-38" width="76" height="76" rx="6"
          fill="url(#diamondFill)" stroke="url(#diamondStroke)" stroke-width="2"
          transform="rotate(45)"/>

    <!-- Inner diamond content -->
    <!-- Crosshair -->
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>

    <!-- "59" number (test count) -->
    <text x="0" y="5" font-family="'Courier New', monospace" font-size="22" fill="#ef4444"
          text-anchor="middle" font-weight="700" filter="url(#sharpGlow)">59</text>
    <text x="0" y="20" font-family="'Segoe UI', sans-serif" font-size="8" fill="#94a3b8"
          text-anchor="middle" letter-spacing="2">TESTS</text>

    <!-- Atomic electron dots on orbits -->
    <circle cx="-70" cy="-30" r="3" fill="#ef4444" opacity="0.7"/>
    <circle cx="55" cy="42" r="2.5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="-15" cy="-65" r="2" fill="#ef4444" opacity="0.5"/>
    <circle cx="72" cy="-10" r="2.5" fill="#f59e0b" opacity="0.5"/>
    <circle cx="-50" cy="50" r="2" fill="#ef4444" opacity="0.4"/>

    <!-- Radar detection blips -->
    <circle cx="18" cy="-15" r="1.5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="-12" cy="10" r="1.2" fill="#ef4444" opacity="0.5"/>

    <!-- Progress arc (coverage indicator) — 59/59 = full -->
    <path d="M-50 -5 A50 50 0 1 1 -49 5" fill="none" stroke="#f59e0b" stroke-width="2.5"
          stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- ═══ Text Content ═══ -->

  <!-- Technique ID badge -->
  <g transform="translate(240, 38)">
    <rect x="0" y="0" width="100" height="26" rx="13"
          fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="0.8"/>
    <text x="50" y="18" font-family="'Courier New', monospace" font-size="13" fill="#ef4444"
          text-anchor="middle" font-weight="700">T1562.001</text>
  </g>
  <!-- MITRE ATT&CK label -->
  <text x="350" y="56" font-family="'Courier New', monospace" font-size="10"
        fill="#f59e0b" letter-spacing="4" opacity="0.5">MITRE ATT&amp;CK</text>

  <!-- Main title line 1 -->
  <text x="240" y="100" font-family="'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="32" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">Impair Defenses</text>

  <!-- Main title line 2 — color accent -->
  <text x="240" y="135" font-family="'Courier New', monospace"
        font-size="22" font-weight="700" fill="#ef4444" letter-spacing="1">Disable or Modify Tools</text>

  <!-- Subtitle -->
  <text x="240" y="160" font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">
    Atomic Red Team Audit Module — All 59 Tests</text>

  <!-- Separator -->
  <line x1="240" y1="175" x2="630" y2="175" stroke="#1e293b" stroke-width="1"/>

  <!-- Platform labels with colored dots -->
  <g transform="translate(240, 192)">
    <!-- Windows -->
    <circle cx="5" cy="-3" r="3" fill="#3b82f6" opacity="0.7"/>
    <text x="14" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">Windows</text>
    <circle cx="80" cy="-3" r="1.3" fill="#334155"/>
    <!-- Linux -->
    <circle cx="90" cy="-3" r="3" fill="#22c55e" opacity="0.7"/>
    <text x="99" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">Linux</text>
    <circle cx="143" cy="-3" r="1.3" fill="#334155"/>
    <!-- macOS -->
    <circle cx="153" cy="-3" r="3" fill="#a855f7" opacity="0.7"/>
    <text x="162" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">macOS</text>
    <circle cx="210" cy="-3" r="1.3" fill="#334155"/>
    <!-- AWS -->
    <circle cx="220" cy="-3" r="3" fill="#f59e0b" opacity="0.7"/>
    <text x="229" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">AWS</text>
    <circle cx="258" cy="-3" r="1.3" fill="#334155"/>
    <!-- ESXi -->
    <circle cx="268" cy="-3" r="3" fill="#06b6d4" opacity="0.7"/>
    <text x="277" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">ESXi</text>
    <circle cx="312" cy="-3" r="1.3" fill="#334155"/>
    <!-- O365 -->
    <circle cx="322" cy="-3" r="3" fill="#ec4899" opacity="0.7"/>
    <text x="331" y="0" font-family="'Segoe UI', sans-serif" font-size="11" fill="#94a3b8">O365</text>
  </g>

  <!-- Category badges row 1 -->
  <g transform="translate(240, 212)">
    <rect x="0" y="0" width="88" height="22" rx="4"
          fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="0.6" opacity="0.8"/>
    <text x="44" y="15" font-family="monospace" font-size="8" fill="#ef4444" text-anchor="middle">Defender</text>

    <rect x="96" y="0" width="78" height="22" rx="4"
          fill="rgba(245,158,11,0.06)" stroke="#f59e0b" stroke-width="0.6" opacity="0.8"/>
    <text x="135" y="15" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle">AMSI</text>

    <rect x="182" y="0" width="78" height="22" rx="4"
          fill="rgba(59,130,246,0.06)" stroke="#3b82f6" stroke-width="0.6" opacity="0.8"/>
    <text x="221" y="15" font-family="monospace" font-size="8" fill="#3b82f6" text-anchor="middle">Sysmon</text>

    <rect x="268" y="0" width="68" height="22" rx="4"
          fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="0.6" opacity="0.8"/>
    <text x="302" y="15" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">EDR</text>

    <rect x="344" y="0" width="68" height="22" rx="4"
          fill="rgba(168,85,247,0.06)" stroke="#a855f7" stroke-width="0.6" opacity="0.8"/>
    <text x="378" y="15" font-family="monospace" font-size="8" fill="#a855f7" text-anchor="middle">ETW</text>
  </g>

  <!-- Category badges row 2 -->
  <g transform="translate(240, 242)">
    <rect x="0" y="0" width="88" height="22" rx="4"
          fill="rgba(239,68,68,0.06)" stroke="#dc2626" stroke-width="0.6" opacity="0.8"/>
    <text x="44" y="15" font-family="monospace" font-size="8" fill="#dc2626" text-anchor="middle">LockBit</text>

    <rect x="96" y="0" width="78" height="22" rx="4"
          fill="rgba(6,182,212,0.06)" stroke="#06b6d4" stroke-width="0.6" opacity="0.8"/>
    <text x="135" y="15" font-family="monospace" font-size="8" fill="#06b6d4" text-anchor="middle">HVCI</text>

    <rect x="182" y="0" width="78" height="22" rx="4"
          fill="rgba(236,72,153,0.06)" stroke="#ec4899" stroke-width="0.6" opacity="0.8"/>
    <text x="221" y="15" font-family="monospace" font-size="8" fill="#ec4899" text-anchor="middle">Office</text>

    <rect x="268" y="0" width="78" height="22" rx="4"
          fill="rgba(245,158,11,0.06)" stroke="#f59e0b" stroke-width="0.6" opacity="0.8"/>
    <text x="307" y="15" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle">GuardDuty</text>

    <rect x="354" y="0" width="58" height="22" rx="4"
          fill="rgba(34,197,94,0.06)" stroke="#22c55e" stroke-width="0.6" opacity="0.8"/>
    <text x="383" y="15" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle">ASR</text>
  </g>

  <!-- ═══ Right Side Stats ═══ -->

  <!-- Version pill -->
  <g transform="translate(770, 45)">
    <rect x="0" y="0" width="84" height="30" rx="15"
          fill="rgba(239,68,68,0.07)" stroke="#ef4444" stroke-width="0.8"/>
    <text x="42" y="20" font-family="monospace" font-size="14" fill="#ef4444"
          text-anchor="middle" font-weight="700">v1.0</text>
  </g>

  <!-- Stat: Tests -->
  <g transform="translate(740, 95)">
    <rect x="0" y="0" width="125" height="35" rx="6"
          fill="rgba(15,23,42,0.65)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="14" y="24" font-family="monospace" font-size="22" fill="#ef4444" font-weight="700">59</text>
    <text x="50" y="24" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">atomic tests</text>
  </g>

  <!-- Stat: Categories -->
  <g transform="translate(740, 140)">
    <rect x="0" y="0" width="125" height="35" rx="6"
          fill="rgba(15,23,42,0.65)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="14" y="24" font-family="monospace" font-size="22" fill="#f59e0b" font-weight="700">18</text>
    <text x="52" y="24" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">categories</text>
  </g>

  <!-- Stat: Platforms -->
  <g transform="translate(740, 185)">
    <rect x="0" y="0" width="125" height="35" rx="6"
          fill="rgba(15,23,42,0.65)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="14" y="24" font-family="monospace" font-size="22" fill="#3b82f6" font-weight="700">6</text>
    <text x="34" y="24" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">platforms</text>
  </g>

  <!-- Stat: Dependencies -->
  <g transform="translate(740, 230)">
    <rect x="0" y="0" width="125" height="35" rx="6"
          fill="rgba(15,23,42,0.65)" stroke="#1e293b" stroke-width="0.6"/>
    <text x="14" y="24" font-family="monospace" font-size="18" fill="#22c55e" font-weight="700">0</text>
    <text x="30" y="24" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b">dependencies</text>
  </g>

  <!-- Bottom accent bar -->
  <rect y="296" width="900" height="4" rx="2" fill="url(#threatBar)" clip-path="url(#clip)" opacity="0.25"/>
</svg>
